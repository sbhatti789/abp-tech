{% extends "base.html" %}
{% block content %}
<h2>Query Logs</h2>

<table>
    <tr>
        <th>ID</th>
        <th>User</th>
        <th>Query Text</th>
        <th>Timestamp</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log[0] }}</td>
        <td>{{ log[1] }}</td>
        <td>{{ log[2] }}</td>
        <td>{{ log[3] }}</td>
    </tr>
    {% endfor %}
</table>

<p style="text-align:center;"><a href="/dashboard">Back to Dashboard</a></p>
{% endblock %}
