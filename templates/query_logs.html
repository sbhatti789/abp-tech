<!DOCTYPE html>
<html>
<head>
    <title>Query Logs</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h2 { color: #222; }
        table { width: 90%; margin: auto; border-collapse: collapse; }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background: #1e63ff;
            color: white;
        }
        a.back { display: block; margin-top: 25px; text-align: center; color: #0066ff; }
    </style>
</head>
<body>

<h2 style="text-align:center;">📊 Query Logs</h2>

<table>
    <tr>
        <th>ID</th>
        <th>User</th>
        <th>Query Text</th>
        <th>Timestamp</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log[0] }}</td>
        <td>{{ log[1] or 'Anonymous' }}</td>
        <td>{{ log[2] }}</td>
        <td>{{ log[3] }}</td>
    </tr>
    {% endfor %}
</table>

<a href="/dashboard" class="back">⬅ Back to Dashboard</a>

</body>
</html>
