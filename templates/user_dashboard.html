<!DOCTYPE html>
<html>
<head>
    <title>User Dashboard</title>
    <style>
        body { 
            font-family: Arial; 
            background: #f6f6f9; 
            margin: 0; 
            padding: 0; 
        }
        .card {
            width: 450px;
            margin: 80px auto;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        a { 
            display: block; 
            margin: 10px 0; 
            color: #0066cc;
            font-size: 18px;
            text-decoration: none;
        }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>User Dashboard</h2>
        <p>Welcome, {{ username }}.</p>

        <a href="/search">Search Database</a>
        <a href="/upload">Upload Document</a>
        <a href="/logout">Logout</a>
    </div>
</body>
</html>
