{% extends "base.html" %}
{% block content %}
<h2>Document Management</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Filename</th>
        <th>Uploaded At</th>
        <th>Uploaded By</th>
        <th>Action</th>
    </tr>

    {% for doc in documents %}
    <tr>
        <td>{{ doc[0] }}</td>
        <td>{{ doc[1] }}</td>
        <td>{{ doc[2] }}</td>
        <td>{{ doc[3] }}</td>
        <td class="actions"><a href="/documents/delete/{{ doc[0] }}">Delete</a></td>
    </tr>
    {% endfor %}
</table>

<p style="text-align:center;"><a href="/dashboard">Back to Dashboard</a></p>
{% endblock %}
