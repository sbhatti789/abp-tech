<!DOCTYPE html>
<html>
<head>
    <title>Manage Documents</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h2 { color: #222; text-align: center; }
        table { width: 80%; margin: auto; border-collapse: collapse; }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #1e63ff;
            color: white;
        }
        a.delete { color: red; text-decoration: none; }
        a.back { display: block; margin-top: 25px; text-align: center; color: #0066ff; }
    </style>
</head>
<body>

<h2>📄 Document Management</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Filename</th>
        <th>Uploaded At</th>
        <th>Uploaded By</th>
        <th>Action</th>
    </tr>

    {% for d in documents %}
    <tr>
        <td>{{ d[0] }}</td>
        <td>{{ d[1] }}</td>
        <td>{{ d[2] }}</td>
        <td>{{ d[3] }}</td>
        <td>
            <a href="/documents/delete/{{ d[0] }}" class="delete"
               onclick="return confirm('Delete this document and its chunks?');">
                Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

<a href="/dashboard" class="back">⬅ Back to Dashboard</a>

</body>
</html>
