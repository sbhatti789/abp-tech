{% extends "base.html" %}
{% block content %}
<h2>User Management</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Role</th>
        <th>Created At</th>
        <th>Actions</th>
    </tr>

    {% for u in users %}
    <tr>
        <td>{{ u[0] }}</td>
        <td>{{ u[1] }}</td>
        <td>{{ u[2] }}</td>
        <td>{{ u[3] }}</td>
        <td class="actions">
            <a href="/users/edit/{{ u[0] }}">Edit</a> |
            <a href="/users/delete/{{ u[0] }}">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

<p style="text-align:center;"><a href="/dashboard">Back to Dashboard</a></p>
{% endblock %}
