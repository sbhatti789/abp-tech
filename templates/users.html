<!DOCTYPE html>
<html>
<head>
    <title>User Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h2 { color: #222; text-align: center; }
        table { width: 80%; margin: auto; border-collapse: collapse; }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #1e63ff;
            color: white;
        }
        a.action {
            text-decoration: none;
            margin: 0 5px;
        }
        a.delete {
            color: red;
        }
        a.back { display: block; margin-top: 25px; text-align: center; color: #0066ff; }
    </style>
</head>
<body>

<h2>👥 User Management</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Role</th>
        <th>Created At</th>
        <th>Actions</th>
    </tr>

    {% for u in users %}
    <tr>
        <td>{{ u[0] }}</td>
        <td>{{ u[1] }}</td>
        <td>{{ u[2] }}</td>
        <td>{{ u[3] }}</td>
        <td>
            <a href="/users/edit/{{ u[0] }}" class="action">Edit</a>
            <a href="/users/delete/{{ u[0] }}" class="action delete"
               onclick="return confirm('Delete this user and all of their data?');">
                Delete
            </a>
        </td>
    </tr>
    {% endfor %}
</table>

<a href="/dashboard" class="back">⬅ Back to Dashboard</a>

</body>
</html>
