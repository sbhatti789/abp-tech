<!DOCTYPE html>
<html>
<head>
    <title>Search the Database</title>
    <style>
        body { font-family: Arial; padding: 40px; }
        .container { max-width: 700px; margin: auto; }
        input[type=text] {
            width: 100%; padding: 12px; margin-bottom: 10px;
            border-radius: 6px; border: 1px solid #aaa;
        }
        button {
            width: 100%; padding: 12px;
            background: #2563eb; color: white; border: none;
            border-radius: 6px; cursor: pointer; font-size: 16px;
        }
        .result-box {
            border: 1px solid #ccc; padding: 12px;
            margin-top: 15px; border-radius: 6px; background: #f9f9f9;
        }
        .filename { font-weight: bold; color: #2563eb; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔍 Search the Crime Database</h2>

    <form method="POST">
        <input type="text" name="query" placeholder="Enter your question..." required>
        <button type="submit">Search</button>
    </form>

    {% if results %}
        <h3>Top Matches:</h3>
        {% for ((text, filename), score) in results %}
            <div class="result-box">
                <div class="filename">{{ filename }}</div>
                <div>{{ text[:300] }}...</div>
                <div><small>Score: {{ "%.4f"|format(score) }}</small></div>
            </div>
        {% endfor %}
    {% endif %}

    <p><a href="/dashboard">⬅ Back to Dashboard</a></p>
</div>
</body>
</html>
