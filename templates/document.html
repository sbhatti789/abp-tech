<!DOCTYPE html>
<html>
<head>
    <title>Manage Documents</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h2 { color: #222; }
        table { width: 70%; margin: auto; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #ccc; text-align: left; }
        button { color: red; cursor: pointer; }
        a { display: block; margin-top: 20px; text-decoration: none; color: #0066ff; }
    </style>
</head>
<body>

<h2>📄 Document Management</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Filename</th>
        <th>Uploaded By</th>
        <th></th>
    </tr>

    {% for doc in documents %}
    <tr>
        <td>{{ doc[0] }}</td>
        <td>{{ doc[1] }}</td>
        <td>{{ doc[2] or 'Unknown' }}</td>
        <td>
            <form action="/delete_document/{{ doc[0] }}" method="POST">
                <button>Delete</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

<a href="/dashboard">⬅ Back to Dashboard</a>

</body>
</html>
