<!DOCTYPE html>
<html>
<head>
    <title>{{ filename }}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; line-height: 1.6; }
        h2 { color: #222; }
        pre {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 6px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        a.back { display: block; margin-top: 20px; color: #0066ff; }
    </style>
</head>
<body>
    <h2>📄 {{ filename }}</h2>

    <pre>{{ full_text|safe }}</pre>

    <a href="/search" class="back">⬅ Back to Search</a>
</body>
</html>
