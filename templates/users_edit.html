<!DOCTYPE html>
<html>
<head>
    <title>Edit User</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; text-align:center; }
        h2 { color: #222; }
        form { display: inline-block; margin-top: 20px; }
        label { display: block; margin-bottom: 10px; }
        select, button {
            padding: 8px 12px;
            font-size: 16px;
            margin-top: 10px;
        }
        a.back { display: block; margin-top: 25px; color: #0066ff; }
    </style>
</head>
<body>

<h2>✏️ Edit User</h2>

<p><strong>Username:</strong> {{ user[1] }}</p>
<p><strong>Current role:</strong> {{ user[2] }}</p>

<form method="POST">
    <label for="role">New Role:</label>
    <select name="role" id="role">
        <option value="user"    {% if user[2] == 'user' %}selected{% endif %}>user</option>
        <option value="curator" {% if user[2] == 'curator' %}selected{% endif %}>curator</option>
        <option value="admin"   {% if user[2] == 'admin' %}selected{% endif %}>admin</option>
    </select>
    <br>
    <button type="submit">Save Changes</button>
</form>

<a href="/users" class="back">⬅ Back to Users</a>

</body>
</html>
